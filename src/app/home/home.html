<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>School Events</title>
  <link rel="stylesheet" href="home.css">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
</head>

<body>
  <h1><strong>School Events</strong></h1>

  <div class="filters">
    <button class="filter all active">All</button>
    <button class="filter student">Student Life</button>
    <button class="filter clubs">Clubs</button>
    <button class="filter sports">Sports</button>
  </div>
  <div *ngFor"let event of events" class="scrollable-container" >
    <div class="day">
      <h2 class="lined-title">Dec 1</h2>
      <div class="event pink">
        <div class="event-info">
          <h3 class="icon-text"><i class="fa-solid fa-bell"></i>{{ event.name }} </h3>
          <p class="icon-text"><i class="fa-solid fa-clock"></i>2:40–4:00</p>
          <p class="icon-text"><i class="fa-solid fa-location-dot"></i>Room 225</p>
        </div>
        <div class="event-img"></div>
      </div>
      <div class="event purple">
        <div class="event-info">
          <h3 class="icon-text"><i class="fa-solid fa-bell"></i>App Club</h3>
          <p class="icon-text"><i class="fa-solid fa-clock"></i>2:40–4:00</p>
          <p class="icon-text"><i class="fa-solid fa-location-dot"></i>Room 225</p>
        </div>
        <div class="event-img"></div>
      </div>
    </div>
    <div class="day">
      <h2 class="lined-title">Dec 2</h2>
      <div class="event pink">
        <div class="event-info">
          <h3 class="icon-text"><i class="fa-solid fa-bell"></i>App Club</h3>
          <p class="icon-text"><i class="fa-solid fa-clock"></i>2:40–4:00</p>
          <p class="icon-text"><i class="fa-solid fa-location-dot"></i>Room 225</p>
        </div>
        <div class="event-img"></div>
      </div>
      <div class="event purple">
        <div class="event-info">
          <h3 class="icon-text"><i class="fa-solid fa-bell"></i>App Club</h3>
          <p class="icon-text"><i class="fa-solid fa-clock"></i>2:40–4:00</p>
          <p class="icon-text"><i class="fa-solid fa-location-dot"></i>Room 225</p>
        </div>
        <div class="event-img"></div>
      </div>
    </div>
  </div>
  <div class="bottom-nav">
    <div class="nav-item active">
      <button class="nav-button" aria-label="Home">
        <div class="icon-wrapper">
          <span class="material-icons">home</span>
        </div>
      </button>
      <p>Home</p>
    </div>

    <div class="nav-item">
      <button class="nav-button" aria-label="Calendar">
        <div class="icon-wrapper">
          <span class="material-icons">calendar_today</span>
        </div>
      </button>
      <p>Calendar</p>
    </div>
  </div>

  <link href="https://fonts.googleapis.com/icon?family=Material+Icons" rel="stylesheet">

</body>

</html>
